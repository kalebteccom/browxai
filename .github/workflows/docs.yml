name: docs

# Build the VitePress documentation site and deploy it to GitHub Pages.
#
# Requires a one-time owner step BEFORE the auto-publish push-trigger
# is re-enabled:
#   1. Flip the repo public (Settings → General → Change visibility).
#   2. Enable Pages: Settings → Pages → Source = "GitHub Actions".
# Until that lands, this workflow runs ONLY on explicit dispatch
# (`gh workflow run docs.yml` or the GitHub UI's "Run workflow" button),
# so a private-repo + Pages-disabled state doesn't red-flag every push.
# Once the repo is public and Pages is enabled, restore `push: branches: [main]`
# on the trigger below to resume auto-publish.

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Build only reads the repo and produces a pages artifact; no Pages or
    # OIDC scope needed here (universal-baseline excessive-permissions).
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm docs:build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Pages deployment is the only step that needs `pages: write` +
    # `id-token: write` (the latter for the OIDC-attested Pages publish).
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
